# Ruleset pf que carga bibliotecario-root-setup.sh en /etc/pf-bibliotecario.conf
# y aplica el LaunchDaemon com.fran.bibliotecario-pf en cada arranque con
# `pfctl -ef`.
#
# Reproduce las anclas por defecto de macOS (las de /etc/pf.conf) para no perder
# las reglas del sistema al sustituir el ruleset principal, y añade el ancla
# `bibliotecario` con la redirección 80 -> 8080.
#
# Orden obligado por pf: normalización (scrub) -> traducción (nat, rdr) ->
# filtrado (anchor).
scrub-anchor "com.apple/*"
nat-anchor "com.apple/*"
rdr-anchor "com.apple/*"
dummynet-anchor "com.apple/*"
rdr-anchor "bibliotecario"
anchor "com.apple/*"
load anchor "com.apple" from "/etc/pf.anchors/com.apple"
load anchor "bibliotecario" from "/etc/pf.anchors/bibliotecario"
