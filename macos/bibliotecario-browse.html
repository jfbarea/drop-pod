<!DOCTYPE html>
<!--
  Plantilla "El Archivo" para el listado de directorios de Caddy (file_server
  browse). Es un Go template: Caddy inyecta .Path / .CanGoUp / .Breadcrumbs.

  El sidebar es un árbol de accordions: cada carpeta se despliega in-situ y
  carga su contenido bajo demanda pidiendo el listado por JSON al propio Caddy
  (mismo endpoint con cabecera Accept: application/json). Las páginas .html se
  abren en un iframe en el panel lector, sin salir de la página.

  La sirve el servidor "bibliotecario"; install.sh la enlaza a
  ~/.config/caddy/bibliotecario-browse.html y el Caddyfile la referencia con
  file_server { browse … }.

  Dark mode hard-coded (paleta fija, sin toggle) por preferencia del usuario.
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliotecario · {{.Path}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Paleta dark fija (la variante [data-theme=dark] del diseño original). */
:root{
  --paper:#191815;
  --surface:#211F1B;
  --surface-2:#262420;
  --ink:#ECEAE2;
  --muted:#928D82;
  --faint:#5C584F;
  --line:#332F29;
  --accent:#5FA892;
  --accent-soft:#5fa8921f;
  --shadow:0 1px 2px rgba(0,0,0,.2),0 12px 28px rgba(0,0,0,.28);
  --radius:14px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  height:100%;
  font-family:"Newsreader",Georgia,serif;
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}

/* ---------- shell ---------- */
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;height:100dvh}

/* ---------- header ---------- */
header{
  display:flex;align-items:center;gap:20px;
  padding:14px 26px;border-bottom:1px solid var(--line);background:var(--surface);
}
.wordmark{
  font-family:"Fraunces",serif;font-weight:600;font-size:19px;
  letter-spacing:-.01em;display:flex;align-items:center;gap:10px;white-space:nowrap;
}
.wordmark .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.search{flex:1;max-width:420px;position:relative}
.search input{
  width:100%;font-family:"JetBrains Mono",monospace;font-size:12.5px;
  color:var(--ink);background:var(--surface-2);border:1px solid transparent;
  border-radius:10px;padding:9px 12px 9px 32px;outline:none;transition:border-color .2s,background .2s;
}
.search input::placeholder{color:var(--faint)}
.search input:focus{border-color:var(--accent);background:var(--surface)}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--muted)}
.spacer{flex:1}
.count{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.02em;white-space:nowrap}

/* ---------- body grid ---------- */
.body{display:grid;grid-template-columns:330px 1fr;min-height:0}

/* ---------- catalog (sidebar) ---------- */
.catalog{border-right:1px solid var(--line);background:var(--surface);display:flex;flex-direction:column;min-height:0}
.crumbs{
  display:flex;align-items:center;flex-wrap:wrap;gap:2px;
  padding:12px 18px;border-bottom:1px solid var(--line);
  font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);word-break:break-word;
}
.crumbs a{color:var(--muted);text-decoration:none}
.crumbs a:hover{color:var(--accent)}
.crumbs .sep{color:var(--faint);padding:0 5px}
.crumbs .here{color:var(--ink)}

.list{overflow-y:auto;padding:8px;min-height:0;scrollbar-width:thin;scrollbar-color:var(--line) transparent}

.entry{
  display:block;width:100%;text-align:left;border:none;background:transparent;cursor:pointer;
  padding:11px 14px;border-radius:10px;border-left:2px solid transparent;color:inherit;
  text-decoration:none;
  transition:background .16s;
}
.entry:hover{background:var(--surface-2)}
.entry.active{background:var(--accent-soft);border-left-color:var(--accent)}
.entry h3{
  font-family:"Fraunces",serif;font-weight:500;font-size:15px;line-height:1.25;
  letter-spacing:-.005em;display:flex;align-items:center;gap:8px;margin-bottom:5px;
}
.entry h3 .chev{flex:none;color:var(--muted);transition:transform .18s}
.entry.open > h3 .chev{transform:rotate(90deg)}
.entry h3 .gap{display:inline-block;width:11px;flex:none}
.entry h3 .ic{flex:none;color:var(--accent)}
.entry h3 .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry .meta{
  font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.02em;color:var(--muted);
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-left:19px;
}
.entry .meta .tag{color:var(--accent)}
.entry .meta .sep{color:var(--faint)}
.entry .meta .path{color:var(--faint);font-style:normal}

.kids{margin:2px 0 4px;border-left:1px solid var(--line);margin-left:20px}
.loading,.no-results,.empty-dir{
  font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);
  padding:10px 16px;line-height:1.6;
}
.no-results{padding:28px 18px;font-size:11.5px}

/* ---------- reader ---------- */
.reader{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:40px}
.empty .glyph{font-family:"Fraunces",serif;font-size:46px;color:var(--faint);margin-bottom:14px}
.empty p{font-size:16px;max-width:320px;line-height:1.5}
.empty .hint{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--faint);margin-top:10px}

.docview{display:flex;flex-direction:column;height:100%;animation:rise .4s cubic-bezier(.2,.7,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.docbar{display:flex;align-items:center;gap:12px;padding:12px 22px;border-bottom:1px solid var(--line);background:var(--surface)}
.docbar .name{font-family:"Fraunces",serif;font-weight:500;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.docbar a,.docbar .back{
  font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-decoration:none;
  background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
.docbar a:hover,.docbar .back:hover{color:var(--accent)}
.docbar svg{width:13px;height:13px;stroke:currentColor;fill:none}
.frame{flex:1;width:100%;border:none;background:var(--surface)}

/* ---------- mobile ---------- */
@media(max-width:760px){
  .body{grid-template-columns:1fr}
  .catalog{border-right:none}
  .reader{display:none}
  .search{max-width:none}
  body.reading .catalog{display:none}
  body.reading .reader{display:flex}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="wordmark"><span class="dot"></span>Bibliotecario</div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="text" placeholder="buscar en todo el árbol…" autocomplete="off">
    </div>
    <div class="spacer"></div>
    <span class="count" id="count"></span>
  </header>

  <div class="body">
    <aside class="catalog">
      <nav class="crumbs" id="crumbs"></nav>
      <div class="list" id="list"></div>
    </aside>
    <section class="reader" id="reader">
      <div class="empty">
        <div class="glyph">¶</div>
        <p>Despliega una carpeta o elige una página. Los <code>.html</code> se abren aquí mismo.</p>
        <div class="hint">— sala de lectura —</div>
      </div>
    </section>
  </div>
</div>

<script>
/* ────────── datos inyectados por Caddy (Go template) ────────── */
let PATH = "{{.Path}}";
if (!PATH.endsWith('/')) PATH += '/';
const CAN_UP = {{if .CanGoUp}}true{{else}}false{{end}};
const CRUMBS = [
{{- range .Breadcrumbs}}
  {link:"{{.Link}}", text:"{{.Text}}"},
{{- end}}
];

/* ────────── refs e iconos ────────── */
const listEl   = document.getElementById('list');
const readerEl = document.getElementById('reader');
const countEl  = document.getElementById('count');
const crumbsEl = document.getElementById('crumbs');
const qEl      = document.getElementById('q');

const FOLDER = '<svg class="ic" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>';
const DOC    = '<svg class="ic" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8Z"/><path d="M14 3v5h5"/></svg>';
const CHEV   = '<svg class="chev" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>';

/* ────────── modelo de árbol (carga perezosa vía JSON) ────────── */
const ROOT = {name:'', abs:PATH, isDir:true, children:null};
const expanded = new Set();
let query = '';
let activeAbs = null;

const MAX_DEPTH = 12;

const human = b => {
  if (b == null) return '';
  if (b < 1024) return b + ' B';
  const u = ['KB','MB','GB','TB']; let i = -1;
  do { b /= 1024; i++; } while (b >= 1024 && i < u.length - 1);
  return (b < 10 ? b.toFixed(1) : Math.round(b)) + ' ' + u[i];
};
const fmt = iso => {
  const d = new Date(iso); if (isNaN(d)) return '';
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
};
const ext = it => {
  if (it.isDir) return 'carpeta';
  const m = it.name.toLowerCase().match(/\.([a-z0-9]+)$/);
  return m ? m[1] : 'archivo';
};
const isHtml = it => !it.isDir && /\.html?$/i.test(it.name);

async function loadChildren(node){
  if (node.children !== null) return node.children;
  try {
    const r = await fetch(encodeURI(node.abs), {headers:{Accept:'application/json'}});
    const data = r.ok ? await r.json() : [];
    node.children = (data || []).map(d => ({
      name: d.name,
      abs:  node.abs + d.name,        // abs/name ya traen '/' final en carpetas
      isDir: d.is_dir,
      bytes: d.size,
      mod:   fmt(d.mod_time),
      children: null,
    })).sort((a,b) => (b.isDir - a.isDir) || a.name.localeCompare(b.name, 'es'));
  } catch (e) {
    node.children = [];
  }
  return node.children;
}

async function crawl(node, depth=0){
  if (depth > MAX_DEPTH) return;
  await loadChildren(node);
  await Promise.all(node.children.filter(c => c.isDir).map(c => crawl(c, depth+1)));
}

/* ────────── render: árbol de accordions ────────── */
function entryEl(node, depth, isAcc){
  const el = document.createElement(isAcc || node.isDir ? 'button' : 'a');
  el.className = 'entry' + (node.isDir ? '' : '') + (expanded.has(node.abs) ? ' open' : '') + (node.abs === activeAbs ? ' active' : '');
  const lead = node.isDir ? CHEV : '<span class="gap"></span>';
  const icon = node.isDir ? FOLDER : DOC;
  const tag = ext(node);
  const meta = node.isDir
    ? `<span>${node.children ? node.children.length + ' elem.' : 'carpeta'}</span><span class="sep">/</span><span class="tag">#${tag}</span>`
    : `<span>${node.mod}</span><span class="sep">/</span><span>${human(node.bytes)}</span><span class="sep">/</span><span class="tag">#${tag}</span>`;
  el.innerHTML = `<h3>${lead}${icon}<span class="nm">${node.name.replace(/\/$/,'')}</span></h3><div class="meta">${meta}</div>`;
  return el;
}

function buildNode(node, depth){
  const frag = document.createDocumentFragment();
  if (node.isDir){
    const head = entryEl(node, depth, true);
    head.onclick = () => toggle(node);
    frag.appendChild(head);
    if (expanded.has(node.abs)){
      const kids = document.createElement('div');
      kids.className = 'kids';
      if (node.children === null){
        kids.innerHTML = '<div class="loading">cargando…</div>';
      } else if (!node.children.length){
        kids.innerHTML = '<div class="empty-dir">vacía</div>';
      } else {
        node.children.forEach(c => kids.appendChild(buildNode(c, depth+1)));
      }
      frag.appendChild(kids);
    }
  } else {
    const el = entryEl(node, depth, false);
    el.href = 'javascript:void 0';
    el.onclick = (e) => { e.preventDefault(); openDoc(node); };
    frag.appendChild(el);
  }
  return frag;
}

function renderTree(){
  listEl.innerHTML = '';
  if (ROOT.children === null){ listEl.innerHTML = '<div class="loading">cargando catálogo…</div>'; return; }
  if (CAN_UP){
    const up = document.createElement('a');
    up.className = 'entry'; up.href = '..';
    up.innerHTML = `<h3><span class="gap"></span>${FOLDER}<span class="nm">..</span></h3><div class="meta"><span>subir un nivel</span></div>`;
    listEl.appendChild(up);
  }
  countEl.textContent = ROOT.children.length + ' entrada' + (ROOT.children.length === 1 ? '' : 's');
  if (!ROOT.children.length){ listEl.insertAdjacentHTML('beforeend', '<div class="empty-dir">cripta vacía</div>'); return; }
  ROOT.children.forEach(n => listEl.appendChild(buildNode(n, 0)));
}

function renderSearch(){
  const matches = [];
  (function walk(node){
    if (!node.children) return;
    for (const c of node.children){
      if (c.name.toLowerCase().includes(query)) matches.push(c);
      if (c.isDir) walk(c);
    }
  })(ROOT);

  countEl.textContent = matches.length + ' resultado' + (matches.length === 1 ? '' : 's');
  listEl.innerHTML = '';
  if (!matches.length){
    listEl.innerHTML = '<div class="no-results">Sin coincidencias.<br>Prueba con otra palabra.</div>';
    return;
  }
  matches.forEach(node => {
    const el = entryEl(node, 0, !node.isDir ? false : true);
    const rel = node.abs.slice(ROOT.abs.length).replace(/\/$/,'');
    const dir = rel.includes('/') ? rel.slice(0, rel.lastIndexOf('/')) : '';
    if (dir) el.querySelector('.meta').insertAdjacentHTML('beforeend', `<span class="sep">·</span><span class="path">${dir}/</span>`);
    if (node.isDir){ el.onclick = () => reveal(node); }
    else { el.tagName === 'A' && (el.href = 'javascript:void 0'); el.onclick = (e) => { e && e.preventDefault && e.preventDefault(); openDoc(node); }; }
    listEl.appendChild(el);
  });
}

function render(){ query ? renderSearch() : renderTree(); }

async function toggle(node){
  if (expanded.has(node.abs)){ expanded.delete(node.abs); render(); return; }
  expanded.add(node.abs);
  render();                 // pinta "cargando…"
  await loadChildren(node);
  render();
}

function reveal(node){
  query = ''; qEl.value = '';
  let cur = ROOT.abs;
  node.abs.slice(ROOT.abs.length).split('/').filter(Boolean).forEach(seg => {
    cur += seg + '/'; expanded.add(cur);
  });
  render();
}

function openDoc(node){
  activeAbs = node.abs;
  const src = encodeURI(node.abs);
  const ext = '<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>';
  const back = '<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>';
  if (!isHtml(node)) window.open(src, '_blank', 'noopener');
  readerEl.innerHTML = `
    <div class="docview">
      <div class="docbar">
        <span class="name">${node.name}</span>
        <a href="${src}" target="_blank" rel="noopener">${ext}pestaña nueva</a>
        <button class="back" id="back">${back}catálogo</button>
      </div>
      <iframe class="frame" src="${src}" title="${node.name}"></iframe>
    </div>`;
  document.body.classList.add('reading');
  const b = document.getElementById('back');
  if (b) b.onclick = () => document.body.classList.remove('reading');
  render();
}

function renderCrumbs(){
  let html = '';
  CRUMBS.forEach((c,i) => {
    if (i) html += '<span class="sep">/</span>';
    const text = c.text || '⌂';
    html += (i === CRUMBS.length - 1) ? `<span class="here">${text}</span>` : `<a href="${c.link}">${text}</a>`;
  });
  crumbsEl.innerHTML = html;
}

qEl.addEventListener('input', async e => {
  query = e.target.value.trim().toLowerCase();
  if (query){ listEl.innerHTML = '<div class="loading">rastreando el árbol…</div>'; await crawl(ROOT); }
  render();
});

/* arranque */
renderCrumbs();
(async () => { await loadChildren(ROOT); render(); })();
</script>
</body>
</html>
